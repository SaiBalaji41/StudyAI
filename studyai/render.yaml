services:
  - type: web
    name: studyai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: FLASK_DEBUG
        value: "false"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
